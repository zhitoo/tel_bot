server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://bot-server:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Hashed build assets (index-XXXX.js, etc.) are safe to cache forever —
    # a new deploy always ships new filenames.
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html references those hashed filenames, so it must NEVER be
    # cached by the browser or any CDN in front of this — otherwise a client
    # can keep loading a stale JS bundle (with old/fixed bugs) indefinitely
    # after a redeploy, even though the new files exist on the server.
    location / {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
